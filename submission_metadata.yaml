ai_usage_summary: |
  ChatGPT was used for debugging, documentation generation,
  methodology discussions, ranking strategy refinement,
  and project organization.

methodology_summary: |
  A rule-based candidate ranking system was developed
  for Senior AI Engineer hiring. Candidates are scored
  using experience relevance, title relevance, industry
  fit, GitHub activity, recruiter engagement signals,
  interview completion rate, notice period, profile
  completeness, and job-description skill matching.
  Additional bonuses are applied for retrieval-system
  expertise and critical skills including Embeddings,
  Information Retrieval, Learning to Rank, and
  Recommendation Systems. Final rankings are generated
  by score and tie-broken using candidate_id ordering
  according to challenge requirements.

